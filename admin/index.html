<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网页后台管理</title>
  <link rel="stylesheet" href="style.css">
  <!-- Monaco Editor 样式 -->
  <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/editor/editor.main.min.css">
</head>
<body>
  <div id="app">
    <!-- 登录界面 -->
    <div id="login-section" class="container">
      <h2>后台登录</h2>
      <form id="login-form">
        <input type="email" id="email" placeholder="邮箱" required autocomplete="email">
        <input type="password" id="password" placeholder="密码" required autocomplete="current-password">
        <button type="submit">登录</button>
      </form>
      <p id="login-error" style="color:red"></p>
    </div>

    <!-- 管理界面（登录后显示） -->
    <div id="admin-section" style="display:none">
      <header>
        <h1>📄 网页内容管理</h1>
        <button id="logout-btn">登出</button>
      </header>

      <div class="main-panel">
        <div class="sidebar">
          <h3>页面列表</h3>
          <ul id="page-list"></ul>
          <button id="new-page-btn">➕ 新建页面</button>
        </div>

        <div class="editor-area">
          <div id="page-meta">
            <label>Slug (URL路径): <input type="text" id="slug" placeholder="例如: about"></label>
            <label>标题: <input type="text" id="title" placeholder="页面标题"></label>
            <label>发布状态: <input type="checkbox" id="is-published" checked></label>
            <button id="save-btn">💾 保存</button>
            <button id="delete-btn" style="background:#d32f2f">🗑️ 删除</button>
            <span id="save-status"></span>
          </div>

          <div class="tabs">
            <button class="tab-btn active" data-tab="html">HTML</button>
            <button class="tab-btn" data-tab="css">CSS</button>
            <button class="tab-btn" data-tab="js">JavaScript</button>
          </div>

          <div id="editor-container" style="height: 500px; border:1px solid #ccc"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 第三方库：Supabase SDK 和 Monaco Editor 加载器 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
  <!-- 主逻辑：所有 Supabase 初始化都在这里面完成 -->
  <script src="app.js"></script>
</body>
</html>
